<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="icon.png" type="image/png">
</head>
<body>
    <div class="container">
        <h2>Real-time Character Counter</h2>
        <textarea name="textar" id="textar" class="textar" placeholder="Please Write Your Text Here" maxlength="50"></textarea>
        <div class="counter">
            <p>Total Characters: <span id="total-counter" class="total-counter"></span></p>
            <p>Remaining Characters: <span id="remaining-counter" class="remaining-counter"></span></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
